<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Catch the Sakura 🌸</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
    }

    body {
      min-height: 100vh;
      overflow: hidden;
      background:
        radial-gradient(circle at 20% 20%, rgba(255, 214, 230, 0.35), transparent 25%),
        radial-gradient(circle at 80% 30%, rgba(255, 182, 193, 0.22), transparent 30%),
        linear-gradient(180deg, #fff7fb, #ffe4ee, #ffd6e7, #ffc8dd);
      color: #7a3556;
      position: relative;
    }

    .bg-stars {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      overflow: hidden;
    }

    .bg-star {
      position: absolute;
      top: -10vh;
      width: 16px;
      height: 16px;
      background: radial-gradient(circle at 30% 30%, #fff7fb, #ffb7d5 70%);
      border-radius: 70% 0 70% 0;
      opacity: 0.85;
      filter: blur(0.2px);
      animation: fallBg linear infinite;
      transform: rotate(45deg);
    }

    @keyframes fallBg {
      0% {
        transform: translateY(-10vh) translateX(0) rotate(45deg);
        opacity: 0;
      }
      10% {
        opacity: 0.9;
      }
      100% {
        transform: translateY(115vh) translateX(80px) rotate(320deg);
        opacity: 0.15;
      }
    }

    .container {
      position: relative;
      z-index: 2;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px;
    }

    .top-bar {
      width: 100%;
      max-width: 900px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 10px;
      margin-bottom: 20px;
      gap: 10px;
      flex-wrap: wrap;
    }

    .back-btn {
      text-decoration: none;
      color: #8a3d63;
      background: rgba(255, 255, 255, 0.62);
      border: 1px solid rgba(255, 255, 255, 0.85);
      padding: 10px 18px;
      border-radius: 999px;
      transition: 0.3s ease;
      backdrop-filter: blur(8px);
      box-shadow: 0 8px 24px rgba(204, 102, 153, 0.12);
      font-weight: 600;
    }

    .back-btn:hover {
      background: linear-gradient(135deg, #ffd6e7, #ffb7d5);
      border-color: rgba(255,255,255,0.95);
      transform: translateY(-2px) scale(1.04);
      box-shadow: 0 12px 28px rgba(255, 105, 180, 0.2);
    }

    .title {
      text-align: center;
      margin-top: 10px;
      margin-bottom: 10px;
    }

    .title h1 {
      font-size: clamp(2rem, 5vw, 3.5rem);
      font-weight: 700;
      letter-spacing: 1px;
      color: #8a3d63;
      text-shadow: 0 0 18px rgba(255, 182, 193, 0.25);
    }

    .title p {
      color: #a85b81;
      margin-top: 8px;
      font-size: 1rem;
    }

    .stats {
      display: flex;
      gap: 15px;
      margin: 15px 0 20px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .stat-box {
      background: rgba(255, 255, 255, 0.45);
      border: 1px solid rgba(255, 255, 255, 0.7);
      padding: 12px 18px;
      border-radius: 18px;
      min-width: 120px;
      text-align: center;
      backdrop-filter: blur(10px);
      box-shadow: 0 8px 30px rgba(204, 102, 153, 0.12);
    }

    .stat-label {
      font-size: 0.85rem;
      color: #a85b81;
      margin-bottom: 5px;
    }

    .stat-value {
      font-size: 1.4rem;
      font-weight: bold;
      color: #8a2f5b;
    }

    .controls {
      margin-bottom: 15px;
    }

    .start-btn {
      border: none;
      background: linear-gradient(135deg, #ffd6e7, #ffb7d5);
      color: #8a2f5b;
      padding: 14px 28px;
      border-radius: 999px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      transition: 0.3s ease;
      box-shadow: 0 10px 25px rgba(255, 105, 180, 0.18);
    }

    .start-btn:hover {
      transform: translateY(-2px) scale(1.03);
      box-shadow: 0 12px 28px rgba(255, 105, 180, 0.22);
    }

    .game-area {
      position: relative;
      width: min(92vw, 900px);
      height: min(68vh, 560px);
      border-radius: 28px;
      background: rgba(255, 255, 255, 0.45);
      border: 1px solid rgba(255, 255, 255, 0.6);
      overflow: hidden;
      backdrop-filter: blur(12px);
      box-shadow: 0 20px 60px rgba(204, 102, 153, 0.16);
    }

    .game-overlay {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 20px;
      z-index: 5;
      background: rgba(255, 240, 246, 0.48);
      backdrop-filter: blur(6px);
    }

    .overlay-card {
      background: rgba(255, 255, 255, 0.58);
      padding: 30px 24px;
      border-radius: 24px;
      border: 1px solid rgba(255, 255, 255, 0.78);
      max-width: 420px;
      width: 100%;
      box-shadow: 0 16px 40px rgba(204, 102, 153, 0.14);
    }

    .overlay-card h2 {
      font-size: 1.8rem;
      margin-bottom: 10px;
      color: #8a2f5b;
    }

    .overlay-card p {
      color: #a85b81;
      margin-bottom: 18px;
      line-height: 1.6;
    }

    .sakura {
      position: absolute;
      font-size: 2rem;
      cursor: pointer;
      user-select: none;
      animation: fall linear forwards;
      filter: drop-shadow(0 0 10px rgba(255, 182, 193, 0.55));
      z-index: 2;
      will-change: transform;
    }

    @keyframes fall {
      from {
        transform: translateY(-60px) rotate(0deg);
      }
      to {
        transform: translateY(700px) rotate(360deg);
      }
    }

    .pop {
      position: absolute;
      color: #ff7eb3;
      font-weight: bold;
      font-size: 1rem;
      pointer-events: none;
      animation: popUp 0.7s ease forwards;
      z-index: 4;
      text-shadow: 0 0 10px rgba(255, 126, 179, 0.45);
    }

    @keyframes popUp {
      0% {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
      100% {
        opacity: 0;
        transform: translateY(-25px) scale(1.2);
      }
    }

    .hidden {
      display: none;
    }

    @media (max-width: 600px) {
      .game-area {
        height: 60vh;
      }

      .stat-box {
        min-width: 100px;
        padding: 10px 14px;
      }

      .stat-value {
        font-size: 1.2rem;
      }

      .sakura {
        font-size: 1.8rem;
      }
    }
  </style>
</head>
<body>
  <div class="bg-stars" id="bgStars"></div>

  <div class="container">
    <div class="top-bar">
      <a href="index.html" class="back-btn">← Back</a>
    </div>

    <div class="title">
      <h1>Catch the Sakura 🌸</h1>
      <p>Click as many sakura petals as you can before time runs out.</p>
    </div>

    <div class="stats">
      <div class="stat-box">
        <div class="stat-label">Score</div>
        <div class="stat-value" id="score">0</div>
      </div>
      <div class="stat-box">
        <div class="stat-label">Time</div>
        <div class="stat-value" id="time">20</div>
      </div>
      <div class="stat-box">
        <div class="stat-label">Best</div>
        <div class="stat-value" id="best">0</div>
      </div>
    </div>

    <div class="controls">
      <button class="start-btn" id="startBtn">Start Game</button>
    </div>

    <div class="game-area" id="gameArea">
      <div class="game-overlay" id="overlay">
        <div class="overlay-card">
          <h2>Ready? 🌸</h2>
          <p>
            Catch as many sakura petals as you can in 20 seconds.<br>
            Soft hands only 😌
          </p>
          <button class="start-btn" id="overlayStartBtn">Play Now</button>
        </div>
      </div>
    </div>
  </div>

  <script>
    const gameArea = document.getElementById("gameArea");
    const scoreEl = document.getElementById("score");
    const timeEl = document.getElementById("time");
    const bestEl = document.getElementById("best");
    const startBtn = document.getElementById("startBtn");
    const overlay = document.getElementById("overlay");
    const bgStars = document.getElementById("bgStars");

    let score = 0;
    let timeLeft = 20;
    let gameRunning = false;
    let timerInterval = null;
    let spawnInterval = null;

    let bestScore = Number(localStorage.getItem("catchTheStarsBest") || 0);
    bestEl.textContent = bestScore;

    function createBackgroundStars() {
      for (let i = 0; i < 35; i++) {
        const s = document.createElement("div");
        s.classList.add("bg-star");
        s.style.left = Math.random() * 100 + "vw";
        s.style.animationDuration = (6 + Math.random() * 8) + "s";
        s.style.animationDelay = (Math.random() * 6) + "s";
        s.style.opacity = 0.45 + Math.random() * 0.5;
        s.style.transform = `rotate(${35 + Math.random() * 40}deg) scale(${0.8 + Math.random() * 0.8})`;
        bgStars.appendChild(s);
      }
    }
    createBackgroundStars();

    function startGame() {
      clearGame();
      score = 0;
      timeLeft = 20;
      gameRunning = true;
      scoreEl.textContent = score;
      timeEl.textContent = timeLeft;
      overlay.classList.add("hidden");

      timerInterval = setInterval(() => {
        timeLeft--;
        timeEl.textContent = timeLeft;

        if (timeLeft <= 0) {
          endGame();
        }
      }, 1000);

      spawnInterval = setInterval(() => {
        spawnSakura();
      }, 520);
    }

    function spawnSakura() {
      if (!gameRunning) return;

      const sakura = document.createElement("div");
      sakura.classList.add("sakura");
      sakura.textContent = "🌸";

      const areaWidth = gameArea.clientWidth;
      const randomX = Math.random() * (areaWidth - 50);
      const duration = (Math.random() * 1.4 + 2.4).toFixed(2);

      sakura.style.left = randomX + "px";
      sakura.style.top = "-40px";
      sakura.style.animationDuration = duration + "s";

      sakura.addEventListener("click", () => {
        if (!gameRunning) return;
        score++;
        scoreEl.textContent = score;
        createPop("+1", sakura.offsetLeft, sakura.offsetTop);
        sakura.remove();
      });

      sakura.addEventListener("animationend", () => {
        sakura.remove();
      });

      gameArea.appendChild(sakura);
    }

    function createPop(text, x, y) {
      const pop = document.createElement("div");
      pop.classList.add("pop");
      pop.textContent = text;
      pop.style.left = x + "px";
      pop.style.top = y + "px";
      gameArea.appendChild(pop);

      setTimeout(() => {
        pop.remove();
      }, 700);
    }

    function endGame() {
      gameRunning = false;
      clearInterval(timerInterval);
      clearInterval(spawnInterval);

      document.querySelectorAll(".sakura").forEach(sakura => sakura.remove());

      if (score > bestScore) {
        bestScore = score;
        localStorage.setItem("catchTheStarsBest", bestScore);
        bestEl.textContent = bestScore;
      }

      let message = "Nice reflexes 👀";
      if (score >= 30) {
        message = "Jago amat jadi sakura catcher pro 🌸";
      } else if (score >= 20) {
        message = "Widiii bole uga lau 🌸✨";
      } else if (score >= 10) {
        message = "Yahhh oke la ya 😌";
      }

      overlay.innerHTML = `
        <div class="overlay-card">
          <h2>Time's up! 🌸</h2>
          <p>
            Your score: <strong>${score}</strong><br>
            ${message}
          </p>
          <button class="start-btn" id="playAgainBtn">Play Again</button>
        </div>
      `;
      overlay.classList.remove("hidden");

      document.getElementById("playAgainBtn").addEventListener("click", startGame);
    }

    function clearGame() {
      clearInterval(timerInterval);
      clearInterval(spawnInterval);
      document.querySelectorAll(".sakura").forEach(sakura => sakura.remove());

      if (!overlay.querySelector("#overlayStartBtn") && !overlay.querySelector("#playAgainBtn")) {
        overlay.innerHTML = `
          <div class="overlay-card">
            <h2>Ready? 🌸</h2>
            <p>
              Catch as many sakura petals as you can in 20 seconds.<br>
              Soft hands only 😌
            </p>
            <button class="start-btn" id="overlayStartBtn">Play Now</button>
          </div>
        `;
        document.getElementById("overlayStartBtn").addEventListener("click", startGame);
      }
    }

    startBtn.addEventListener("click", startGame);

    document.addEventListener("click", (e) => {
      if (e.target && e.target.id === "overlayStartBtn") {
        startGame();
      }
    });
  </script>
</body>
</html>
