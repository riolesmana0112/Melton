<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mel's Sakura Playlist 🌸</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
    }

    body {
      min-height: 100vh;
      overflow-x: hidden;
      background:
        radial-gradient(circle at 20% 20%, rgba(255, 214, 230, 0.35), transparent 25%),
        radial-gradient(circle at 80% 30%, rgba(255, 182, 193, 0.22), transparent 30%),
        linear-gradient(180deg, #fff7fb, #ffe4ee, #ffd6e7, #ffc8dd);
      color: #7a3556;
      position: relative;
    }

    .bg-stars {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      overflow: hidden;
    }

    .bg-star {
      position: absolute;
      top: -10vh;
      width: 16px;
      height: 16px;
      background: radial-gradient(circle at 30% 30%, #fff7fb, #ffb7d5 70%);
      border-radius: 70% 0 70% 0;
      opacity: 0.85;
      filter: blur(0.2px);
      animation: fall linear infinite;
      transform: rotate(45deg);
    }

    @keyframes fall {
      0% {
        transform: translateY(-10vh) translateX(0) rotate(45deg);
        opacity: 0;
      }
      10% {
        opacity: 0.9;
      }
      100% {
        transform: translateY(115vh) translateX(80px) rotate(320deg);
        opacity: 0.15;
      }
    }

    .container {
      position: relative;
      z-index: 2;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px;
    }

    .top-bar {
      width: 100%;
      max-width: 980px;
      display: flex;
      justify-content: flex-start;
      margin-top: 10px;
      margin-bottom: 20px;
    }

    .back-btn {
      text-decoration: none;
      color: #8a3d63;
      background: rgba(255, 255, 255, 0.62);
      border: 1px solid rgba(255, 255, 255, 0.85);
      padding: 10px 18px;
      border-radius: 999px;
      transition: all 0.3s ease;
      backdrop-filter: blur(8px);
      box-shadow: 0 10px 24px rgba(204, 102, 153, 0.12);
      font-weight: 600;
    }

    .back-btn:hover {
      background: linear-gradient(135deg, #ffd6e7, #ffb7d5);
      border-color: rgba(255,255,255,0.95);
      transform: translateY(-2px) scale(1.05);
      box-shadow: 0 12px 28px rgba(255, 105, 180, 0.2);
    }

    .main-card {
      width: 100%;
      max-width: 980px;
      padding: 34px 24px 28px;
      border-radius: 30px;
      background: rgba(255, 255, 255, 0.45);
      border: 1px solid rgba(255, 255, 255, 0.6);
      backdrop-filter: blur(14px);
      box-shadow: 0 20px 60px rgba(204, 102, 153, 0.16);
      text-align: center;
    }

    .eyebrow {
      color: #b5658b;
      font-size: 0.9rem;
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-bottom: 10px;
      font-weight: 600;
    }

    h1 {
      font-size: clamp(2rem, 6vw, 3.8rem);
      font-weight: 700;
      color: #8a3d63;
      margin-bottom: 12px;
      text-shadow: 0 0 18px rgba(255, 182, 193, 0.25);
    }

    .subtitle {
      color: #a85b81;
      font-size: 1rem;
      line-height: 1.8;
      max-width: 650px;
      margin: 0 auto 26px;
    }

    .button-group {
      display: flex;
      justify-content: center;
      gap: 14px;
      flex-wrap: wrap;
      margin-bottom: 28px;
    }

    .playlist-btn {
      border: none;
      cursor: pointer;
      min-width: 170px;
      padding: 14px 24px;
      border-radius: 999px;
      font-size: 1rem;
      font-weight: 600;
      color: #8a2f5b;
      background: rgba(255, 255, 255, 0.62);
      border: 1px solid rgba(255, 255, 255, 0.85);
      backdrop-filter: blur(10px);
      transition: all 0.3s ease;
      box-shadow: 0 10px 28px rgba(204, 102, 153, 0.12);
    }

    .playlist-btn:hover {
      transform: translateY(-3px) scale(1.05);
      background: linear-gradient(135deg, #ffd6e7, #ffb7d5);
      border-color: rgba(255,255,255,0.95);
      box-shadow: 0 14px 30px rgba(255, 105, 180, 0.2);
      filter: brightness(1.03);
    }

    .playlist-btn.active {
      transform: translateY(-2px);
      background: linear-gradient(135deg, #ffd6e7, #ffb7d5);
      border: 1px solid rgba(255,255,255,0.95);
      box-shadow: 0 12px 28px rgba(255, 105, 180, 0.18);
      color: #7a244d;
    }

    .preview-card {
      margin: 0 auto;
      width: 100%;
      max-width: 720px;
      background: rgba(255, 255, 255, 0.45);
      border: 1px solid rgba(255, 255, 255, 0.7);
      border-radius: 26px;
      padding: 28px 22px;
      text-align: left;
      box-shadow: 0 15px 40px rgba(204, 102, 153, 0.12);
    }

    .mood-badge {
      display: inline-block;
      padding: 8px 14px;
      border-radius: 999px;
      font-size: 0.85rem;
      color: #9a4f75;
      background: rgba(255, 255, 255, 0.55);
      border: 1px solid rgba(255, 255, 255, 0.7);
      margin-bottom: 16px;
      font-weight: 600;
    }

    .preview-title {
      font-size: clamp(1.5rem, 4vw, 2.3rem);
      margin-bottom: 8px;
      color: #8a2f5b;
    }

    .preview-text {
      color: #a85b81;
      line-height: 1.8;
      margin-bottom: 16px;
      font-size: 1rem;
    }

    .preview-note {
      color: #b5658b;
      line-height: 1.7;
      margin-bottom: 22px;
      font-size: 0.95rem;
      font-style: italic;
    }

    .spotify-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      text-decoration: none;
      color: white;
      padding: 14px 22px;
      border-radius: 999px;
      background: linear-gradient(135deg, #1DB954, #1ed760);
      font-weight: 700;
      transition: all 0.3s ease;
      box-shadow: 0 12px 28px rgba(29, 185, 84, 0.28);
    }

    .spotify-btn:hover {
      transform: translateY(-2px) scale(1.05);
      filter: brightness(1.08);
      box-shadow: 0 14px 30px rgba(29, 185, 84, 0.35);
    }

    .tiny-note {
      margin-top: 18px;
      color: rgba(181, 101, 139, 0.8);
      font-size: 0.9rem;
      line-height: 1.6;
    }

    @media (max-width: 700px) {
      .main-card {
        padding: 28px 16px 22px;
        border-radius: 24px;
      }

      .playlist-btn {
        width: 100%;
        max-width: 280px;
      }

      .preview-card {
        padding: 22px 16px;
      }
    }
  </style>
</head>
<body>
  <div class="bg-stars" id="bgStars"></div>

  <div class="container">
    <div class="top-bar">
      <a href="index.html" class="back-btn">← Back</a>
    </div>

    <div class="main-card">
      <div class="eyebrow">Mel's little music corner 🌸</div>
      <h1>Mel's Sakura Playlist 🎵</h1>
      <p class="subtitle">
        Choose based on Mel's mood.<br>
        Cute vibes only.
      </p>

      <div class="button-group">
        <button class="playlist-btn active" onclick="showPlaylist('happy')">Happy Mel</button>
        <button class="playlist-btn" onclick="showPlaylist('sad')">Sad Mel</button>
        <button class="playlist-btn" onclick="showPlaylist('focus')">Focus Mel</button>
      </div>

      <div class="preview-card">
        <div class="mood-badge" id="moodBadge">☀️ happy mode</div>
        <h2 class="preview-title" id="previewTitle">Happy Mel</h2>

        <p class="preview-text" id="previewText">
          YEY your happy! Keep being happy ok always be happy.
        </p>

        <p class="preview-note" id="previewNote">
          Keeping the good vibes on repeat.
        </p>

        <a class="spotify-btn" id="spotifyLink" href="https://open.spotify.com/playlist/24fqDeT1KewZ8VYCpMRmNE?si=42d1a91886234d55&pt=21572e685b31036ff7f9ab3813f5216e" target="_blank">
          Open in Spotify
        </a>
    </div>
  </div>

  <script>
    const bgStars = document.getElementById("bgStars");

    function createBackgroundStars() {
      for (let i = 0; i < 35; i++) {
        const s = document.createElement("div");
        s.classList.add("bg-star");
        s.style.left = Math.random() * 100 + "vw";
        s.style.animationDuration = (6 + Math.random() * 8) + "s";
        s.style.animationDelay = (Math.random() * 6) + "s";
        s.style.opacity = 0.45 + Math.random() * 0.5;
        s.style.transform = `rotate(${35 + Math.random() * 40}deg) scale(${0.8 + Math.random() * 0.8})`;
        bgStars.appendChild(s);
      }
    }
    createBackgroundStars();

    const playlists = {
      happy: {
        badge: "☀️ happy mode",
        title: "Happy Mel",
        text: "YEY your happy! Keep being happy ok always be happy.",
        note: "Keeping the good vibes on repeat.",
        link: "https://open.spotify.com/playlist/24fqDeT1KewZ8VYCpMRmNE?si=6ae2138852034ebc"
      },
      sad: {
        badge: "🌙 slow mode",
        title: "Sad Mel",
        text: "Rough day? I'm here if u want to talk.",
        note: "Take your time. No rush, okay?",
        link: "https://open.spotify.com/playlist/0NIID9hWvC7kNB3lrVTmiL?si=4481c40f24f743bb"
      },
      focus: {
        badge: "🪐 focus mode",
        title: "Focus Mel",
        text: "Hope this helps you focus.",
        note: "Lock in gently, no stress.",
        link: "https://open.spotify.com/playlist/2OMeE0D1wHHP2JzXXZqbbp?si=1e2a7c17a2264553"
      }
    };

    const moodBadge = document.getElementById("moodBadge");
    const previewTitle = document.getElementById("previewTitle");
    const previewText = document.getElementById("previewText");
    const previewNote = document.getElementById("previewNote");
    const spotifyLink = document.getElementById("spotifyLink");
    const buttons = document.querySelectorAll(".playlist-btn");

    function showPlaylist(type) {
      const data = playlists[type];

      moodBadge.textContent = data.badge;
      previewTitle.textContent = data.title;
      previewText.textContent = data.text;
      previewNote.textContent = data.note;
      spotifyLink.href = data.link;

      buttons.forEach(btn => btn.classList.remove("active"));

      if (type === "happy") buttons[0].classList.add("active");
      if (type === "sad") buttons[1].classList.add("active");
      if (type === "focus") buttons[2].classList.add("active");
    }
  </script>
</body>
</html>
