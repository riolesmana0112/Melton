    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
    }

    body {
      min-height: 100vh;
      overflow-x: hidden;
      background: linear-gradient(180deg, #0f172a, #1e1b4b, #312e81);
      color: white;
      position: relative;
    }

    .bg-stars {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      overflow: hidden;
    }

    .bg-star {
      position: absolute;
      width: 3px;
      height: 3px;
      background: rgba(255, 255, 255, 0.8);
      border-radius: 50%;
      animation: twinkle 3s infinite ease-in-out;
    }

    @keyframes twinkle {
      0%, 100% { opacity: 0.2; transform: scale(1); }
      50% { opacity: 1; transform: scale(1.8); }
    }

    .container {
      position: relative;
      z-index: 2;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px;
    }

    .top-bar {
      width: 100%;
      max-width: 980px;
      display: flex;
      justify-content: flex-start;
      margin-top: 10px;
      margin-bottom: 20px;
    }

    .back-btn {
      text-decoration: none;
      color: white;
      background: rgba(255, 255, 255, 0.12);
      border: 1px solid rgba(255, 255, 255, 0.15);
      padding: 10px 18px;
      border-radius: 999px;
      transition: all 0.3s ease;
      backdrop-filter: blur(8px);
      box-shadow: 0 10px 24px rgba(0, 0, 0, 0.18);
    }

    /* BACK BUTTON HOVER -> BIRU */
    .back-btn:hover {
      background: linear-gradient(135deg, #38bdf8, #6366f1);
      border-color: rgba(255,255,255,0.08);
      transform: translateY(-2px) scale(1.05);
      box-shadow: 0 12px 28px rgba(99, 102, 241, 0.35);
    }

    .main-card {
      width: 100%;
      max-width: 980px;
      padding: 34px 20px 28px;
      border-radius: 30px;
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.12);
      backdrop-filter: blur(14px);
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.35);
      text-align: center;
    }

    .eyebrow {
      color: #cbd5e1;
      font-size: 0.9rem;
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-bottom: 10px;
    }

    h1 {
      font-size: clamp(2rem, 7vw, 4rem);

      color: #f8fafc;
      margin-bottom: 10px;
      text-shadow: 0 0 18px rgba(255, 255, 255, 0.08);

      color: #cbd5e1;
      font-size: 1rem;
      line-height: 1.8;
      max-width: 680px;
      margin: 0 auto 24px;
    }

      width: 100%;
      max-width: 720px;
      margin: 0 auto 24px;
      padding: 26px 18px;
      border-radius: 26px;
      background: rgba(255, 255, 255, 0.07);
      border: 1px solid rgba(255, 255, 255, 0.10);
      box-shadow: 0 15px 40px rgba(0, 0, 0, 0.22);
    }

    .phase {
      font-size: 1rem;
      color: #cbd5e1;
      margin-bottom: 18px;
      letter-spacing: 0.5px;
    }

    .orb-wrap {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 220px;
      margin-bottom: 18px;
    }

    .orb {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      background: radial-gradient(circle at 30% 30%, #38bdf8, #6366f1 70%);
      box-shadow:

      animation: breathe 8s ease-in-out infinite;

      color: #cbd5e1;
      line-height: 1.8;
      font-size: 0.98rem;
    }

      display: flex;
      justify-content: center;
      gap: 14px;
      flex-wrap: wrap;
      margin-top: 10px;
      margin-bottom: 24px;

      cursor: pointer;
      min-width: 180px;
      padding: 14px 24px;
      border-radius: 999px;
      font-size: 1rem;
      font-weight: 600;
      color: white;

      border-color: rgba(255,255,255,0.08);
      box-shadow: 0 14px 30px rgba(99, 102, 241, 0.45);
      filter: brightness(1.05);
    }

    .note-card {
      width: 100%;
      max-width: 720px;
      margin: 0 auto;
      padding: 26px 20px;
      border-radius: 26px;
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.12);
      box-shadow: 0 15px 40px rgba(0, 0, 0, 0.22);
      text-align: left;

      display: inline-block;
      padding: 8px 14px;

      font-size: 0.85rem;
      color: #e2e8f0;
      background: rgba(255, 255, 255, 0.1);

      margin-bottom: 10px;

      color: #cbd5e1;

      font-size: 1.02rem;
      min-height: 88px;
    }

      margin-top: 16px;
      color: rgba(203, 213, 225, 0.8);
      font-size: 0.9rem;
      line-height: 1.7;

        height: 105px;
      }

        min-height: auto;
      }

      }
