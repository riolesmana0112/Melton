<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Breathe 🌸</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
    }

    body {
      min-height: 100vh;
      overflow-x: hidden;
      background:
        radial-gradient(circle at 20% 20%, rgba(255, 214, 230, 0.35), transparent 25%),
        radial-gradient(circle at 80% 30%, rgba(255, 182, 193, 0.22), transparent 30%),
        linear-gradient(180deg, #fff7fb, #ffe4ee, #ffd6e7, #ffc8dd);
      color: #7a3556;
      position: relative;
    }

    .bg-stars {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      overflow: hidden;
    }

    .bg-star {
      position: absolute;
      top: -10vh;
      width: 16px;
      height: 16px;
      background: radial-gradient(circle at 30% 30%, #fff7fb, #ffb7d5 70%);
      border-radius: 70% 0 70% 0;
      opacity: 0.85;
      filter: blur(0.2px);
      animation: fall linear infinite;
      transform: rotate(45deg);
    }

    @keyframes fall {
      0% {
        transform: translateY(-10vh) translateX(0) rotate(45deg);
        opacity: 0;
      }
      10% {
        opacity: 0.9;
      }
      100% {
        transform: translateY(115vh) translateX(80px) rotate(320deg);
        opacity: 0.15;
      }
    }

    .container {
      position: relative;
      z-index: 2;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px;
    }

    .top-bar {
      width: 100%;
      max-width: 980px;
      display: flex;
      justify-content: flex-start;
      margin-top: 10px;
      margin-bottom: 20px;
    }

    .back-btn {
      text-decoration: none;
      color: #8a3d63;
      background: rgba(255, 255, 255, 0.62);
      border: 1px solid rgba(255, 255, 255, 0.85);
      padding: 10px 18px;
      border-radius: 999px;
      transition: all 0.3s ease;
      backdrop-filter: blur(8px);
      box-shadow: 0 10px 24px rgba(204, 102, 153, 0.12);
      font-weight: 600;
    }

    .back-btn:hover {
      background: linear-gradient(135deg, #ffd6e7, #ffb7d5);
      border-color: rgba(255,255,255,0.95);
      transform: translateY(-2px) scale(1.05);
      box-shadow: 0 12px 28px rgba(255, 105, 180, 0.2);
    }

    .main-card {
      width: 100%;
      max-width: 980px;
      padding: 34px 20px 28px;
      border-radius: 30px;
      background: rgba(255, 255, 255, 0.45);
      border: 1px solid rgba(255, 255, 255, 0.6);
      backdrop-filter: blur(14px);
      box-shadow: 0 20px 60px rgba(204, 102, 153, 0.16);
      text-align: center;
    }

    .eyebrow {
      color: #b5658b;
      font-size: 0.9rem;
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-bottom: 10px;
      font-weight: 600;
    }

    h1 {
      font-size: clamp(2rem, 7vw, 4rem);
      font-weight: 700;
      color: #8a3d63;
      margin-bottom: 10px;
      text-shadow: 0 0 18px rgba(255, 182, 193, 0.25);
    }

    .subtitle {
      color: #a85b81;
      font-size: 1rem;
      line-height: 1.8;
      max-width: 680px;
      margin: 0 auto 24px;
    }

    .breathe-box {
      width: 100%;
      max-width: 720px;
      margin: 0 auto 24px;
      padding: 26px 18px;
      border-radius: 26px;
      background: rgba(255, 255, 255, 0.45);
      border: 1px solid rgba(255, 255, 255, 0.7);
      box-shadow: 0 15px 40px rgba(204, 102, 153, 0.12);
    }

    .phase {
      font-size: 1rem;
      color: #a85b81;
      margin-bottom: 18px;
      letter-spacing: 0.5px;
      font-weight: 600;
    }

    .orb-wrap {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 220px;
      margin-bottom: 18px;
    }

    .orb {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      background: radial-gradient(circle at 30% 30%, #ffd6e7, #ff8fbc 70%);
      box-shadow:
        0 0 35px rgba(255, 182, 193, 0.35),
        0 0 70px rgba(255, 105, 180, 0.22);
      animation: breathe 8s ease-in-out infinite;
    }

    @keyframes breathe {
      0%, 100% {
        transform: scale(0.9);
        box-shadow:
          0 0 25px rgba(255, 182, 193, 0.25),
          0 0 50px rgba(255, 105, 180, 0.18);
      }
      50% {
        transform: scale(1.35);
        box-shadow:
          0 0 45px rgba(255, 182, 193, 0.42),
          0 0 90px rgba(255, 105, 180, 0.28);
      }
    }

    .helper-text {
      color: #a85b81;
      line-height: 1.8;
      font-size: 0.98rem;
    }

    .button-group {
      display: flex;
      justify-content: center;
      gap: 14px;
      flex-wrap: wrap;
      margin-top: 10px;
      margin-bottom: 24px;
    }

    .action-btn {
      border: none;
      cursor: pointer;
      min-width: 180px;
      padding: 14px 24px;
      border-radius: 999px;
      font-size: 1rem;
      font-weight: 600;
      color: #8a2f5b;
      background: rgba(255, 255, 255, 0.62);
      border: 1px solid rgba(255, 255, 255, 0.85);
      backdrop-filter: blur(10px);
      transition: all 0.3s ease;
      box-shadow: 0 10px 28px rgba(204, 102, 153, 0.12);
    }

    .action-btn:hover {
      transform: translateY(-3px) scale(1.05);
      background: linear-gradient(135deg, #ffd6e7, #ffb7d5);
      border-color: rgba(255,255,255,0.95);
      box-shadow: 0 14px 30px rgba(255, 105, 180, 0.2);
      filter: brightness(1.03);
    }

    .note-card {
      width: 100%;
      max-width: 720px;
      margin: 0 auto;
      padding: 26px 20px;
      border-radius: 26px;
      background: rgba(255, 255, 255, 0.45);
      border: 1px solid rgba(255, 255, 255, 0.7);
      box-shadow: 0 15px 40px rgba(204, 102, 153, 0.12);
      text-align: left;
    }

    .note-badge {
      display: inline-block;
      padding: 8px 14px;
      border-radius: 999px;
      font-size: 0.85rem;
      color: #9a4f75;
      background: rgba(255, 255, 255, 0.55);
      border: 1px solid rgba(255, 255, 255, 0.7);
      margin-bottom: 16px;
      font-weight: 600;
    }

    .note-title {
      font-size: clamp(1.5rem, 5vw, 2.2rem);
      color: #8a2f5b;
      margin-bottom: 10px;
      min-height: 42px;
    }

    .note-text {
      color: #a85b81;
      line-height: 1.9;
      font-size: 1.02rem;
      min-height: 88px;
    }

    .tiny-note {
      margin-top: 16px;
      color: rgba(181, 101, 139, 0.8);
      font-size: 0.9rem;
      line-height: 1.7;
    }

    @media (max-width: 700px) {
      .main-card {
        padding: 28px 14px 22px;
        border-radius: 24px;
      }

      .breathe-box,
      .note-card {
        padding: 22px 14px;
        border-radius: 22px;
      }

      .action-btn {
        width: 100%;
        max-width: 280px;
      }

      .orb-wrap {
        height: 190px;
      }

      .orb {
        width: 105px;
        height: 105px;
      }

      .note-title {
        min-height: auto;
      }

      .note-text {
        min-height: 110px;
      }
    }
  </style>
</head>

    function createBackgroundStars() {

        s.style.opacity = 0.45 + Math.random() * 0.5;

let comfortPool = [];
let softResetPool = [];

function shuffleArray(arr) {
  const copy = [...arr];
  for (let i = copy.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [copy[i], copy[j]] = [copy[j], copy[i]];
  }
  return copy;
}

function getUniqueRandom(poolName, sourceArray) {
  if (poolName === "comfort") {
    if (comfortPool.length === 0) {
      comfortPool = shuffleArray(sourceArray);
    }
    return comfortPool.pop();
  }

  if (poolName === "soft") {
    if (softResetPool.length === 0) {
      softResetPool = shuffleArray(sourceArray);
    }
    return softResetPool.pop();
  }
}

function newNote() {
  const item = getUniqueRandom("comfort", comfortNotes);
  noteBadge.textContent = item.badge;
  noteTitle.textContent = item.title;
  noteText.innerHTML = item.text;
}

function newSoftReset() {
  const item = getUniqueRandom("soft", softResets);
  noteBadge.textContent = item.badge;
  noteTitle.textContent = item.title;
  noteText.innerHTML = item.text;
}
