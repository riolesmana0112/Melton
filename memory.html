<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Memory Sakura Flip 🌸</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
    }

    body {
      min-height: 100vh;
      overflow-x: hidden;
      background:
        radial-gradient(circle at 20% 20%, rgba(255, 214, 230, 0.35), transparent 25%),
        radial-gradient(circle at 80% 30%, rgba(255, 182, 193, 0.22), transparent 30%),
        linear-gradient(180deg, #fff7fb, #ffe4ee, #ffd6e7, #ffc8dd);
      color: #7a3556;
      position: relative;
    }

    .bg-stars {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      overflow: hidden;
    }

    .bg-star {
      position: absolute;
      top: -10vh;
      width: 16px;
      height: 16px;
      background: radial-gradient(circle at 30% 30%, #fff7fb, #ffb7d5 70%);
      border-radius: 70% 0 70% 0;
      opacity: 0.85;
      filter: blur(0.2px);
      animation: fall linear infinite;
      transform: rotate(45deg);
    }

    @keyframes fall {
      0% {
        transform: translateY(-10vh) translateX(0) rotate(45deg);
        opacity: 0;
      }
      10% {
        opacity: 0.9;
      }
      100% {
        transform: translateY(115vh) translateX(80px) rotate(320deg);
        opacity: 0.15;
      }
    }

    .container {
      position: relative;
      z-index: 2;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px;
    }

    .top-bar {
      width: 100%;
      max-width: 900px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 10px;
      margin-bottom: 20px;
    }

    .back-btn,
    .restart-btn {
      text-decoration: none;
      color: #8a3d63;
      background: rgba(255, 255, 255, 0.62);
      border: 1px solid rgba(255, 255, 255, 0.85);
      padding: 10px 18px;
      border-radius: 999px;
      transition: 0.3s ease;
      backdrop-filter: blur(8px);
      box-shadow: 0 8px 24px rgba(204, 102, 153, 0.12);
      cursor: pointer;
      font-size: 0.95rem;
      font-weight: 600;
    }

    .back-btn:hover,
    .restart-btn:hover {
      background: linear-gradient(135deg, #ffd6e7, #ffb7d5);
      border-color: rgba(255,255,255,0.95);
      transform: translateY(-2px) scale(1.04);
      box-shadow: 0 12px 28px rgba(255, 105, 180, 0.2);
    }

    .title {
      text-align: center;
      margin-top: 6px;
      margin-bottom: 10px;
    }

    .title h1 {
      font-size: clamp(2rem, 5vw, 3.5rem);
      font-weight: 700;
      letter-spacing: 1px;
      color: #8a3d63;
      text-shadow: 0 0 18px rgba(255, 182, 193, 0.25);
      margin-bottom: 8px;
    }

    .title p {
      color: #a85b81;
      font-size: 1rem;
      line-height: 1.8;
    }

    .stats {
      display: flex;
      gap: 15px;
      margin: 18px 0 20px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .stat-box {
      background: rgba(255, 255, 255, 0.45);
      border: 1px solid rgba(255, 255, 255, 0.7);
      padding: 12px 18px;
      border-radius: 18px;
      min-width: 120px;
      text-align: center;
      backdrop-filter: blur(10px);
      box-shadow: 0 8px 30px rgba(204, 102, 153, 0.12);
    }

    .stat-label {
      font-size: 0.85rem;
      color: #a85b81;
      margin-bottom: 5px;
    }

    .stat-value {
      font-size: 1.4rem;
      font-weight: bold;
      color: #8a2f5b;
    }

    .game-wrap {
      width: min(92vw, 900px);
      border-radius: 28px;
      background: rgba(255, 255, 255, 0.45);
      border: 1px solid rgba(255, 255, 255, 0.6);
      overflow: hidden;
      backdrop-filter: blur(12px);
      box-shadow: 0 20px 60px rgba(204, 102, 153, 0.16);
      padding: 22px;
      position: relative;
      min-height: 500px;
    }

    .board {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 16px;
      width: 100%;
      min-height: 420px;
      position: relative;
      z-index: 1;
    }

    .card {
      aspect-ratio: 1 / 1;
      min-height: 90px;
      perspective: 1000px;
      cursor: pointer;
      user-select: none;
    }

    .card.disabled {
      pointer-events: none;
    }

    .card-inner {
      position: relative;
      width: 100%;
      height: 100%;
      min-height: 90px;
      transition: transform 0.5s ease;
      transform-style: preserve-3d;
    }

    .card.flipped .card-inner,
    .card.matched .card-inner {
      transform: rotateY(180deg);
    }

    .card-face {
      position: absolute;
      inset: 0;
      border-radius: 22px;
      display: flex;
      align-items: center;
      justify-content: center;
      backface-visibility: hidden;
      -webkit-backface-visibility: hidden;
      box-shadow: 0 10px 30px rgba(204, 102, 153, 0.12);
    }

    .card-front {
      background: linear-gradient(135deg, rgba(255, 214, 231, 0.55), rgba(255, 183, 213, 0.45));
      border: 1px solid rgba(255, 255, 255, 0.75);
      color: #9a4f75;
      font-size: 1.8rem;
      font-weight: 700;
    }

    .card-back {
      transform: rotateY(180deg);
      background: rgba(255, 255, 255, 0.62);
      border: 1px solid rgba(255, 255, 255, 0.85);
      font-size: clamp(2rem, 5vw, 3rem);
    }

    .card.matched .card-back {
      box-shadow:
        0 0 18px rgba(255, 182, 193, 0.28),
        0 0 34px rgba(255, 105, 180, 0.16);
    }

    .helper {
      margin-top: 18px;
      text-align: center;
      color: rgba(181, 101, 139, 0.85);
      font-size: 0.92rem;
      line-height: 1.8;
    }

    .overlay {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 20px;
      z-index: 5;
      background: rgba(255, 240, 246, 0.48);
      backdrop-filter: blur(8px);
    }

    .overlay.hidden {
      display: none;
    }

    .overlay-card {
      background: rgba(255, 255, 255, 0.58);
      padding: 30px 24px;
      border-radius: 24px;
      border: 1px solid rgba(255, 255, 255, 0.78);
      max-width: 420px;
      width: 100%;
      box-shadow: 0 16px 40px rgba(204, 102, 153, 0.14);
    }

    .overlay-card h2 {
      font-size: 1.8rem;
      margin-bottom: 10px;
      color: #8a2f5b;
    }

    .overlay-card p {
      color: #a85b81;
      margin-bottom: 18px;
      line-height: 1.8;
    }

    .play-btn {
      border: none;
      background: linear-gradient(135deg, #ffd6e7, #ffb7d5);
      color: #8a2f5b;
      padding: 14px 28px;
      border-radius: 999px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      transition: 0.3s ease;
      box-shadow: 0 10px 25px rgba(255, 105, 180, 0.18);
    }

    .play-btn:hover {
      transform: translateY(-2px) scale(1.03);
      box-shadow: 0 12px 28px rgba(255, 105, 180, 0.22);
    }

    @media (max-width: 700px) {
      .game-wrap {
        padding: 16px;
        border-radius: 24px;
        min-height: 400px;
      }

      .board {
        gap: 12px;
        min-height: 300px;
      }

      .card-face {
        border-radius: 18px;
      }

      .stat-box {
        min-width: 100px;
        padding: 10px 14px;
      }

      .stat-value {
        font-size: 1.2rem;
      }
    }

    @media (max-width: 480px) {
      .board {
        gap: 10px;
        min-height: 260px;
      }

      .card {
        min-height: 70px;
      }

      .card-inner {
        min-height: 70px;
      }

      .card-front {
        font-size: 1.4rem;
      }

      .card-back {
        font-size: 2rem;
      }
    }
  </style>
</head>
<body>
  <div class="bg-stars" id="bgStars"></div>

  <div class="container">
    <div class="top-bar">
      <a href="game.html" class="back-btn">← Back</a>
      <button class="restart-btn" id="restartBtn">Restart</button>
    </div>

    <div class="title">
      <h1>Memory Sakura Flip 🌸</h1>
      <p>Match all the pairs with the fewest moves possible.</p>
    </div>

    <div class="stats">
      <div class="stat-box">
        <div class="stat-label">Moves</div>
        <div class="stat-value" id="moves">0</div>
      </div>
      <div class="stat-box">
        <div class="stat-label">Matches</div>
        <div class="stat-value" id="matches">0/4</div>
      </div>
      <div class="stat-box">
        <div class="stat-label">Best</div>
        <div class="stat-value" id="best">—</div>
      </div>
    </div>

    <div class="game-wrap">
      <div class="board" id="board"></div>

      <div class="overlay" id="overlay">
        <div class="overlay-card">
          <h2>Ready? 🌸</h2>
          <p>
            Match all 4 pairs!<br>
            Cute brain flex mode activated.
          </p>
          <button class="play-btn" id="startBtn">Play now</button>
        </div>
      </div>
    </div>

    <div class="helper">
      tiny brain flex, but make it sakura 🌸
    </div>
  </div>

  <script>
    const bgStars = document.getElementById("bgStars");
    const board = document.getElementById("board");
    const movesEl = document.getElementById("moves");
    const matchesEl = document.getElementById("matches");
    const bestEl = document.getElementById("best");
    const overlay = document.getElementById("overlay");
    const restartBtn = document.getElementById("restartBtn");

    const symbols = ["🌸", "🎀", "🩷", "✨"];
    const totalPairs = symbols.length;

    let cardsData = [];
    let firstCard = null;
    let secondCard = null;
    let lockBoard = false;
    let moves = 0;
    let matches = 0;
    let gameStarted = false;

    let bestScore = localStorage.getItem("memoryFlipBest");
    bestEl.textContent = bestScore ? bestScore : "—";

    function createBackgroundStars() {
      for (let i = 0; i < 35; i++) {
        const s = document.createElement("div");
        s.classList.add("bg-star");
        s.style.left = Math.random() * 100 + "vw";
        s.style.animationDuration = (6 + Math.random() * 8) + "s";
        s.style.animationDelay = (Math.random() * 6) + "s";
        s.style.opacity = 0.45 + Math.random() * 0.5;
        s.style.transform = `rotate(${35 + Math.random() * 40}deg) scale(${0.8 + Math.random() * 0.8})`;
        bgStars.appendChild(s);
      }
    }

    function shuffle(array) {
      const arr = [...array];
      for (let i = arr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
      }
      return arr;
    }

    function updateStats() {
      movesEl.textContent = moves;
      matchesEl.textContent = `${matches}/${totalPairs}`;
    }

    function createCard(symbol, index) {
      const card = document.createElement("div");
      card.className = "card disabled";
      card.dataset.symbol = symbol;
      card.dataset.index = index;

      card.innerHTML = `
        <div class="card-inner">
          <div class="card-face card-front">✿</div>
          <div class="card-face card-back">${symbol}</div>
        </div>
      `;

      card.addEventListener("click", () => flipCard(card));
      return card;
    }

    function renderBoard() {
      cardsData = shuffle([...symbols, ...symbols]);
      board.innerHTML = "";

      cardsData.forEach((symbol, index) => {
        const card = createCard(symbol, index);
        board.appendChild(card);
      });

      void board.offsetHeight;
    }

    function enableBoard() {
      document.querySelectorAll(".card").forEach(card => {
        card.classList.remove("disabled");
      });
    }

    function disableBoard() {
      document.querySelectorAll(".card").forEach(card => {
        card.classList.add("disabled");
      });
    }

    function resetStateOnly() {
      firstCard = null;
      secondCard = null;
      lockBoard = false;
      moves = 0;
      matches = 0;
      updateStats();
    }

    function showReadyOverlay() {
      overlay.classList.remove("hidden");
      overlay.innerHTML = `
        <div class="overlay-card">
          <h2>Ready? 🌸</h2>
          <p>
            Match all 4 pairs!<br>
            Cute brain flex mode activated.
          </p>
          <button class="play-btn" id="startBtn">Play now</button>
        </div>
      `;

      document.getElementById("startBtn").addEventListener("click", startGame);
    }

    function startGame() {
      gameStarted = true;
      resetStateOnly();
      renderBoard();
      enableBoard();
      overlay.classList.add("hidden");
    }

    function resetToReady() {
      gameStarted = false;
      resetStateOnly();
      renderBoard();
      disableBoard();
      showReadyOverlay();
    }

    function flipCard(card) {
      if (!gameStarted) return;
      if (lockBoard) return;
      if (card === firstCard) return;
      if (card.classList.contains("matched")) return;
      if (card.classList.contains("flipped")) return;

      card.classList.add("flipped");

      if (!firstCard) {
        firstCard = card;
        return;
      }

      secondCard = card;
      moves++;
      updateStats();
      checkMatch();
    }

    function checkMatch() {
      const isMatch = firstCard.dataset.symbol === secondCard.dataset.symbol;

      if (isMatch) {
        firstCard.classList.add("matched");
        secondCard.classList.add("matched");

        firstCard.classList.remove("flipped");
        secondCard.classList.remove("flipped");

        matches++;
        updateStats();

        resetTurn();

        if (matches === totalPairs) {
          setTimeout(showWinOverlay, 450);
        }
      } else {
        lockBoard = true;

        setTimeout(() => {
          firstCard.classList.remove("flipped");
          secondCard.classList.remove("flipped");
          resetTurn();
        }, 800);
      }
    }

    function resetTurn() {
      firstCard = null;
      secondCard = null;
      lockBoard = false;
    }

    function showWinOverlay() {
      gameStarted = false;
      disableBoard();

      let message = "Clean win 👀";
      if (moves <= 6) {
        message = "Actually insane. Sakura brain too powerful 🌸🧠";
      } else if (moves <= 8) {
        message = "Very solid memory. Respect 😮‍💨";
      } else if (moves <= 10) {
        message = "Okayyy not bad at all 😌";
      } else {
        message = "Still a win. We take those 🌸";
      }

      if (!bestScore || moves < Number(bestScore)) {
        bestScore = moves;
        localStorage.setItem("memoryFlipBest", bestScore);
        bestEl.textContent = bestScore;
      }

      overlay.classList.remove("hidden");
      overlay.innerHTML = `
        <div class="overlay-card">
          <h2>All matched! 🌸</h2>
          <p>
            You finished in <strong>${moves}</strong> moves.<br>
            ${message}
          </p>
          <button class="play-btn" id="playAgainBtn">Play again</button>
        </div>
      `;

      document.getElementById("playAgainBtn").addEventListener("click", resetToReady);
    }

    restartBtn.addEventListener("click", resetToReady);

    createBackgroundStars();
    resetToReady();
  </script>
</body>
</html>
