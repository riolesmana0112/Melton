<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Catch the Stars ✨</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
    }

    body {
      min-height: 100vh;
      overflow: hidden;
      background: linear-gradient(180deg, #0f172a, #1e1b4b, #312e81);
      color: white;
      position: relative;
    }

    /* Background stars */
    .bg-stars {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      overflow: hidden;
    }

    .bg-star {
      position: absolute;
      width: 3px;
      height: 3px;
      background: rgba(255, 255, 255, 0.8);
      border-radius: 50%;
      animation: twinkle 3s infinite ease-in-out;
    }

    @keyframes twinkle {
      0%, 100% { opacity: 0.2; transform: scale(1); }
      50% { opacity: 1; transform: scale(1.8); }
    }

    .container {
      position: relative;
      z-index: 2;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px;
    }

    .top-bar {
      width: 100%;
      max-width: 900px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 10px;
      margin-bottom: 20px;
      gap: 10px;
      flex-wrap: wrap;
    }

    .back-btn {
      text-decoration: none;
      color: white;
      background: rgba(255, 255, 255, 0.12);
      border: 1px solid rgba(255, 255, 255, 0.15);
      padding: 10px 18px;
      border-radius: 999px;
      transition: 0.3s ease;
      backdrop-filter: blur(8px);
    }

    .back-btn:hover {
      background: rgba(255, 255, 255, 0.2);
      transform: translateY(-2px);
    }

    .title {
      text-align: center;
      margin-top: 10px;
      margin-bottom: 10px;
    }

    .title h1 {
      font-size: clamp(2rem, 5vw, 3.5rem);
      font-weight: 700;
      letter-spacing: 1px;
      color: #f8fafc;
      text-shadow: 0 0 20px rgba(255, 255, 255, 0.15);
    }

    .title p {
      color: #cbd5e1;
      margin-top: 8px;
      font-size: 1rem;
    }

    .stats {
      display: flex;
      gap: 15px;
      margin: 15px 0 20px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .stat-box {
      background: rgba(255, 255, 255, 0.12);
      border: 1px solid rgba(255, 255, 255, 0.15);
      padding: 12px 18px;
      border-radius: 18px;
      min-width: 120px;
      text-align: center;
      backdrop-filter: blur(10px);
      box-shadow: 0 8px 30px rgba(0, 0, 0, 0.2);
    }

    .stat-label {
      font-size: 0.85rem;
      color: #cbd5e1;
      margin-bottom: 5px;
    }

    .stat-value {
      font-size: 1.4rem;
      font-weight: bold;
      color: #ffffff;
    }

    .controls {
      margin-bottom: 15px;
    }

    .start-btn {
      border: none;
      background: linear-gradient(135deg, #38bdf8, #6366f1);
      color: white;
      padding: 14px 28px;
      border-radius: 999px;
      font-size: 1rem;
      cursor: pointer;
      transition: 0.3s ease;
      box-shadow: 0 10px 25px rgba(99, 102, 241, 0.35);
    }

    .start-btn:hover {
      transform: translateY(-2px) scale(1.03);
    }

    .game-area {
      position: relative;
      width: min(92vw, 900px);
      height: min(68vh, 560px);
      border-radius: 28px;
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.12);
      overflow: hidden;
      backdrop-filter: blur(12px);
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.35);
    }

    .game-overlay {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 20px;
      z-index: 5;
      background: rgba(15, 23, 42, 0.55);
      backdrop-filter: blur(6px);
    }

    .overlay-card {
      background: rgba(255, 255, 255, 0.08);
      padding: 30px 24px;
      border-radius: 24px;
      border: 1px solid rgba(255, 255, 255, 0.12);
      max-width: 420px;
      width: 100%;
    }

    .overlay-card h2 {
      font-size: 1.8rem;
      margin-bottom: 10px;
    }

    .overlay-card p {
      color: #cbd5e1;
      margin-bottom: 18px;
      line-height: 1.6;
    }

    .star {
      position: absolute;
      font-size: 2rem;
      cursor: pointer;
      user-select: none;
      animation: fall linear forwards;
      filter: drop-shadow(0 0 10px rgba(255, 255, 180, 0.7));
      z-index: 2;
    }

    @keyframes fall {
      from {
        transform: translateY(-60px) rotate(0deg);
      }
      to {
        transform: translateY(700px) rotate(360deg);
      }
    }

    .pop {
      position: absolute;
      color: #fde68a;
      font-weight: bold;
      font-size: 1rem;
      pointer-events: none;
      animation: popUp 0.7s ease forwards;
      z-index: 4;
      text-shadow: 0 0 10px rgba(253, 230, 138, 0.8);
    }

    @keyframes popUp {
      0% {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
      100% {
        opacity: 0;
        transform: translateY(-25px) scale(1.2);
      }
    }

    .hidden {
      display: none;
    }

    @media (max-width: 600px) {
      .game-area {
        height: 60vh;
      }

      .stat-box {
        min-width: 100px;
        padding: 10px 14px;
      }

      .stat-value {
        font-size: 1.2rem;
      }

      .star {
        font-size: 1.8rem;
      }
    }
  </style>
</head>
<body>
  <div class="bg-stars" id="bgStars"></div>

  <div class="container">
    <div class="top-bar">
      <a href="index.html" class="back-btn">← Back</a>
    </div>

    <div class="title">
      <h1>Catch the Stars ✨</h1>
      <p>Click as many stars as you can before time runs out.</p>
    </div>

    <div class="stats">
      <div class="stat-box">
        <div class="stat-label">Score</div>
        <div class="stat-value" id="score">0</div>
      </div>
      <div class="stat-box">
        <div class="stat-label">Time</div>
        <div class="stat-value" id="time">20</div>
      </div>
      <div class="stat-box">
        <div class="stat-label">Best</div>
        <div class="stat-value" id="best">0</div>
      </div>
    </div>

    <div class="controls">
      <button class="start-btn" id="startBtn">Start Game</button>
    </div>

    <div class="game-area" id="gameArea">
      <div class="game-overlay" id="overlay">
        <div class="overlay-card">
          <h2>Ready? 🌌</h2>
          <p>
            Catch as many stars as you can in 20 seconds.<br>
            Tunjukkin kalo kamu pro player 😎
          </p>
          <button class="start-btn" id="overlayStartBtn">Play Now</button>
        </div>
      </div>
    </div>
  </div>

  <script>
    const gameArea = document.getElementById("gameArea");
    const scoreEl = document.getElementById("score");
    const timeEl = document.getElementById("time");
    const bestEl = document.getElementById("best");
    const startBtn = document.getElementById("startBtn");
    const overlay = document.getElementById("overlay");
    const overlayStartBtn = document.getElementById("overlayStartBtn");
    const bgStars = document.getElementById("bgStars");

    let score = 0;
    let timeLeft = 20;
    let gameRunning = false;
    let timerInterval = null;
    let spawnInterval = null;

    let bestScore = localStorage.getItem("catchTheStarsBest") || 0;
    bestEl.textContent = bestScore;

    // Background twinkle stars
    function createBackgroundStars() {
      for (let i = 0; i < 70; i++) {
        const s = document.createElement("div");
        s.classList.add("bg-star");
        s.style.left = Math.random() * 100 + "vw";
        s.style.top = Math.random() * 100 + "vh";
        s.style.animationDelay = (Math.random() * 3) + "s";
        s.style.opacity = Math.random();
        bgStars.appendChild(s);
      }
    }
    createBackgroundStars();

    function startGame() {
      // reset
      clearGame();
      score = 0;
      timeLeft = 20;
      gameRunning = true;
      scoreEl.textContent = score;
      timeEl.textContent = timeLeft;
      overlay.classList.add("hidden");

      // timer
      timerInterval = setInterval(() => {
        timeLeft--;
        timeEl.textContent = timeLeft;

        if (timeLeft <= 0) {
          endGame();
        }
      }, 1000);

      // spawn stars
      spawnInterval = setInterval(() => {
        spawnStar();
      }, 550);
    }

    function spawnStar() {
      if (!gameRunning) return;

      const star = document.createElement("div");
      star.classList.add("star");
      star.textContent = "⭐";

      const areaWidth = gameArea.clientWidth;
      const randomX = Math.random() * (areaWidth - 50);
      const duration = (Math.random() * 1.5 + 2.5).toFixed(2); // 2.5 - 4 sec

      star.style.left = randomX + "px";
      star.style.top = "-40px";
      star.style.animationDuration = duration + "s";

      star.addEventListener("click", () => {
        if (!gameRunning) return;
        score++;
        scoreEl.textContent = score;
        createPop("+1", star.offsetLeft, star.offsetTop);
        star.remove();
      });

      star.addEventListener("animationend", () => {
        star.remove();
      });

      gameArea.appendChild(star);
    }

    function createPop(text, x, y) {
      const pop = document.createElement("div");
      pop.classList.add("pop");
      pop.textContent = text;
      pop.style.left = x + "px";
      pop.style.top = y + "px";
      gameArea.appendChild(pop);

      setTimeout(() => {
        pop.remove();
      }, 700);
    }

    function endGame() {
      gameRunning = false;
      clearInterval(timerInterval);
      clearInterval(spawnInterval);

      // remove leftover stars
      document.querySelectorAll(".star").forEach(star => star.remove());

      if (score > bestScore) {
        bestScore = score;
        localStorage.setItem("catchTheStarsBest", bestScore);
        bestEl.textContent = bestScore;
      }

      let message = "Nice reflexes 👀";
      if (score >= 30) {
        message = "Jago amat jadi pro player aja 🌟";
      } else if (score >= 20) {
        message = "Widiii bole ✨";
      } else if (score >= 10) {
        message = "Yahhh oke la ya 😎";
      }

      overlay.innerHTML = `
        <div class="overlay-card">
          <h2>Time's up! ⏳</h2>
          <p>
            Your score: <strong>${score}</strong><br>
            ${message}
          </p>
          <button class="start-btn" id="playAgainBtn">Play Again</button>
        </div>
      `;
      overlay.classList.remove("hidden");

      document.getElementById("playAgainBtn").addEventListener("click", startGame);
    }

    function clearGame() {
      clearInterval(timerInterval);
      clearInterval(spawnInterval);
      document.querySelectorAll(".star").forEach(star => star.remove());

      // restore default overlay if needed
      if (!overlay.querySelector("#overlayStartBtn") && !overlay.querySelector("#playAgainBtn")) {
        overlay.innerHTML = `
          <div class="overlay-card">
            <h2>Ready? 🌌</h2>
            <p>
              Catch as many stars as you can in 20 seconds.<br>
              Fast hands only 😎
            </p>
            <button class="start-btn" id="overlayStartBtn">Play Now</button>
          </div>
        `;
        document.getElementById("overlayStartBtn").addEventListener("click", startGame);
      }
    }

    startBtn.addEventListener("click", startGame);
    overlayStartBtn.addEventListener("click", startGame);
  </script>
</body>
</html>
