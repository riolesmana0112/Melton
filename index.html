<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Welcome Melton</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
    }

    body {
      min-height: 100vh;
      overflow: hidden;
      background:
        radial-gradient(circle at 20% 20%, rgba(255, 214, 230, 0.35), transparent 25%),
        radial-gradient(circle at 80% 30%, rgba(255, 182, 193, 0.22), transparent 30%),
        linear-gradient(180deg, #fff7fb, #ffe4ee, #ffd6e7, #ffc8dd);
      color: #7a3556;
      position: relative;
    }

    /* SAKURA PETALS BACKGROUND */
    .bg-petals {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      overflow: hidden;
    }

    .petal {
      position: absolute;
      top: -10vh;
      width: 16px;
      height: 16px;
      background: radial-gradient(circle at 30% 30%, #fff7fb, #ffb7d5 70%);
      border-radius: 70% 0 70% 0;
      opacity: 0.85;
      filter: blur(0.2px);
      animation: fall linear infinite;
      transform: rotate(45deg);
    }

    @keyframes fall {
      0% {
        transform: translateY(-10vh) translateX(0) rotate(45deg);
        opacity: 0;
      }
      10% {
        opacity: 0.9;
      }
      100% {
        transform: translateY(115vh) translateX(80px) rotate(320deg);
        opacity: 0.15;
      }
    }

    .container {
      position: relative;
      z-index: 2;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .card {
      width: 100%;
      max-width: 760px;
      padding: 50px 28px;
      border-radius: 32px;
      background: rgba(255, 255, 255, 0.45);
      border: 1px solid rgba(255, 255, 255, 0.6);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      box-shadow: 0 20px 60px rgba(204, 102, 153, 0.18);
      text-align: center;
      position: relative;
    }

    .small-text {
      color: #b5658b;
      font-size: 0.95rem;
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-bottom: 12px;
      font-weight: 600;
    }

    .title-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      margin-bottom: 12px;
      flex-wrap: wrap;
    }

    h1 {
      font-size: clamp(2.6rem, 8vw, 5rem);
      font-weight: 800;
      color: #8a3d63;
      text-shadow: 0 0 18px rgba(255, 182, 193, 0.25);
      margin-bottom: 0;
      cursor: pointer;
      transition: transform 0.2s ease;
      user-select: none;
    }

    h1:active {
      transform: scale(0.98);
    }

    /* SAKURA BUTTON */
    .sakura-btn {
      border: none;
      background: rgba(255, 255, 255, 0.55);
      border: 1px solid rgba(255, 255, 255, 0.75);
      color: #d94f8a;
      font-size: 1.5rem;
      width: 56px;
      height: 56px;
      border-radius: 999px;
      cursor: pointer;
      backdrop-filter: blur(10px);
      box-shadow: 0 10px 24px rgba(204, 102, 153, 0.16);
      transition: all 0.3s ease;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }

    .sakura-btn:hover {
      transform: translateY(-2px) scale(1.08);
      background: linear-gradient(135deg, #ffd6e7, #ffb7d5);
      border-color: rgba(255,255,255,0.9);
      box-shadow: 0 12px 28px rgba(255, 105, 180, 0.22);
    }

    .sakura-btn.bloom {
      animation: sakuraBloom 1.2s ease forwards;
    }

    @keyframes sakuraBloom {
      0% {
        transform: scale(1) rotate(0deg);
        opacity: 1;
      }
      30% {
        transform: scale(1.2) rotate(10deg);
      }
      60% {
        transform: scale(1.35) rotate(-10deg);
      }
      100% {
        transform: scale(1.55) rotate(18deg);
        opacity: 0;
      }
    }

    .subtitle {
      color: #a85b81;
      font-size: 1.05rem;
      line-height: 1.8;
      max-width: 520px;
      margin: 0 auto 26px;
      min-height: 34px;
      transition: opacity 0.3s ease;
      font-weight: 500;
    }

    .button-group {
      display: flex;
      justify-content: center;
      gap: 14px;
      flex-wrap: wrap;
      margin-bottom: 16px;
    }

    .menu-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 170px;
      padding: 15px 28px;
      border-radius: 999px;
      text-decoration: none;
      font-size: 1rem;
      font-weight: 700;
      color: #8a3d63;
      background: rgba(255, 255, 255, 0.62);
      border: 1px solid rgba(255, 255, 255, 0.85);
      backdrop-filter: blur(10px);
      transition: all 0.3s ease;
      box-shadow: 0 10px 30px rgba(204, 102, 153, 0.12);
    }

    .menu-btn.primary {
      background: linear-gradient(135deg, #ffd6e7, #ffb7d5);
      border: none;
      box-shadow: 0 12px 28px rgba(255, 105, 180, 0.2);
      color: #8a2f5b;
    }

    .menu-btn:hover {
      transform: translateY(-3px) scale(1.05);
      background: linear-gradient(135deg, #ffc2db, #ff9fc8);
      border-color: rgba(255,255,255,0.95);
      box-shadow: 0 14px 30px rgba(255, 105, 180, 0.25);
      filter: brightness(1.03);
      color: #7a244d;
    }

    .mini-actions {
      display: flex;
      justify-content: center;
      gap: 12px;
      flex-wrap: wrap;
      margin-top: 8px;
    }

    .mini-btn {
      border: none;
      cursor: pointer;
      padding: 10px 18px;
      border-radius: 999px;
      font-size: 0.9rem;
      font-weight: 700;
      color: #8a3d63;
      background: rgba(255, 255, 255, 0.55);
      border: 1px solid rgba(255, 255, 255, 0.8);
      backdrop-filter: blur(10px);
      transition: all 0.3s ease;
    }

    .mini-btn:hover {
      transform: translateY(-2px) scale(1.05);
      background: linear-gradient(135deg, #ffd6e7, #ffb7d5);
      border-color: rgba(255,255,255,0.95);
      color: #7a244d;
      box-shadow: 0 12px 26px rgba(255, 105, 180, 0.2);
    }

    .note-card {
      margin-top: 18px;
      width: 100%;
      max-width: 560px;
      margin-left: auto;
      margin-right: auto;
      padding: 16px 18px;
      border-radius: 22px;
      background: rgba(255, 255, 255, 0.55);
      border: 1px solid rgba(255, 255, 255, 0.8);
      color: #9a4f75;
      line-height: 1.7;
      font-size: 0.96rem;
      min-height: 78px;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      transition: all 0.25s ease;
      font-weight: 500;
    }

    .note-card.show {
      box-shadow: 0 10px 28px rgba(255, 105, 180, 0.14);
    }

    .footer-note {
      margin-top: 18px;
      color: rgba(181, 101, 139, 0.75);
      font-size: 0.88rem;
    }

    .secret-popup,
    .sakura-popup {
      position: fixed;
      left: 50%;
      width: calc(100% - 32px);
      max-width: 440px;
      padding: 16px 18px;
      border-radius: 20px;
      background: rgba(255, 245, 250, 0.95);
      border: 1px solid rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(12px);
      text-align: center;
      color: #8a3d63;
      z-index: 100;
      opacity: 0;
      pointer-events: none;
      transition: all 0.35s ease;
      box-shadow: 0 16px 40px rgba(204, 102, 153, 0.18);
      transform: translateX(-50%) translateY(30px);
    }

    .secret-popup {
      bottom: 28px;
    }

    .sakura-popup {
      bottom: 96px;
    }

    .secret-popup.show,
    .sakura-popup.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    .secret-popup strong,
    .sakura-popup strong {
      display: block;
      color: #7a244d;
      margin-bottom: 4px;
      font-size: 1rem;
    }

    @media (max-width: 600px) {
      .card {
        padding: 40px 18px;
        border-radius: 24px;
      }

      .menu-btn {
        width: 100%;
        max-width: 280px;
      }

      .mini-btn {
        width: 100%;
        max-width: 220px;
      }

      .note-card {
        font-size: 0.92rem;
        min-height: 90px;
      }

      .sakura-btn {
        width: 50px;
        height: 50px;
        font-size: 1.3rem;
      }
    }
  </style>
</head>
<body>
  <div class="bg-petals" id="bgPetals"></div>

  <div class="container">
    <div class="card">
      <div class="small-text">A little corner made for Melton</div>

      <div class="title-row">
        <h1 id="mainTitle">Welcome Melton</h1>
        <button class="sakura-btn" id="sakuraBtn" onclick="bloomSakura()">🌸</button>
      </div>

      <p class="subtitle" id="subtitleText">Choose your vibe</p>

      <div class="button-group">
        <a href="lagu.html" class="menu-btn">Songs</a>
        <a href="game.html" class="menu-btn">Game</a>
        <a href="breathe.html" class="menu-btn">Breathe</a>
        <a href="pet.html" class="menu-btn">Lola the Otter</a>
      </div>

      <div class="mini-actions">
        <button class="mini-btn" onclick="showRandomNote()">Random note</button>
      </div>

      <div class="note-card" id="noteCard">
        Pick whatever feels right.
      </div>
    </div>
  </div>

  <div class="secret-popup" id="secretPopup">
    <strong>Congrats you found the sakura easter egg 👀</strong>
    bonus points for curiosity 🌸
  </div>

  <div class="sakura-popup" id="sakuraPopup">
    <strong>SAKURA BLOOM MODE ACTIVATED 🌸</strong>
  </div>

  <script>
    const bgPetals = document.getElementById("bgPetals");
    const subtitleText = document.getElementById("subtitleText");
    const noteCard = document.getElementById("noteCard");
    const mainTitle = document.getElementById("mainTitle");
    const secretPopup = document.getElementById("secretPopup");
    const sakuraBtn = document.getElementById("sakuraBtn");
    const sakuraPopup = document.getElementById("sakuraPopup");

    // background sakura petals
    function createPetals() {
      for (let i = 0; i < 35; i++) {
        const p = document.createElement("div");
        p.classList.add("petal");
        p.style.left = Math.random() * 100 + "vw";
        p.style.animationDuration = (6 + Math.random() * 8) + "s";
        p.style.animationDelay = (Math.random() * 6) + "s";
        p.style.opacity = 0.45 + Math.random() * 0.5;
        p.style.transform = `rotate(${35 + Math.random() * 40}deg) scale(${0.8 + Math.random() * 0.8})`;
        bgPetals.appendChild(p);
      }
    }
    createPetals();

    // rotating subtitle
    const subtitles = [
      "Choose your vibe",
      "Soft pink vibes only",
      "Pick whatever feels right",
      "Tiny corner on the internet",
      "Take your time",
      "Stay as long as you want"
    ];

    let subtitleIndex = 0;

    setInterval(() => {
      subtitleIndex = (subtitleIndex + 1) % subtitles.length;
      subtitleText.style.opacity = "0";

      setTimeout(() => {
        subtitleText.textContent = subtitles[subtitleIndex];
        subtitleText.style.opacity = "1";
      }, 250);
    }, 3000);

    // notes
    const notes = [
      "hope today’s being gentle with you 🌸",
      "soft mode activated",
      "tiny break approved",
      "you found the sakura corner",
      "low pressure mode activated",
      "you’re allowed to take things slowly",
      "solid vibe selection so far",
      "you have suspiciously good taste",
      "this button is doing important work",
      "tiny pause successfully unlocked",
      "objectively cute click",
      "main character in spring arc detected",
      "this is your official excuse to chill for a sec",
      "you clicked that with elegance",
      "very respectable decision making",
      "the petals approve of this",
      "this corner is now legally yours",
      "okay that was a clean click",
      "you radiate elite playlist energy",
      "small reset = still progress",
      "your vibe has been acknowledged",
      "certified soft choice",
      "this website supports your current mood",
      "today doesn’t need to be perfect",
      "good things happen after small breaks",
      "you have premium cozy potential",
      "very strong calm energy",
      "pause accepted",
      "nothing wrong with slowing down a little",
      "this is a judgement-free zone",
      "soft reset in progress",
      "you’re allowed to breathe before continuing",
      "tiny reminder: water exists",
      "honestly? solid move",
      "you’ve entered low-pressure mode",
      "being here counts as self care a little bit",
      "not every day has to be productive-core",
      "your shoulders can unclench now btw",
      "there’s no rush in this corner",
      "even five quiet minutes count",
      "today can be soft if you want",
      "you’re allowed to not speedrun everything",
      "good taste confirmed again",
      "rest is not a bug",
      "you’re doing enough for right now",
      "this is a very elegant pause",
      "the vibe check has been passed",
      "this website is gently rooting for you",
      "you’ve got elite cozy energy",
      "good choice, no notes (except this one)",
      "tiny comfort delivered successfully"
    ];

    let noteClickCount = 0;

    function showRandomNote() {
      noteClickCount++;

      if (noteClickCount === 10) {
        noteCard.innerHTML = "you’re blooming better than you think 🌸";
        noteCard.classList.add("show");

        setTimeout(() => {
          noteCard.classList.remove("show");
        }, 900);

        noteClickCount = 0;
        return;
      }

      const random = notes[Math.floor(Math.random() * notes.length)];
      noteCard.textContent = random;
      noteCard.classList.add("show");

      setTimeout(() => {
        noteCard.classList.remove("show");
      }, 700);
    }

    // title easter egg (3 clicks)
    let titleClickCount = 0;
    let clickResetTimer;

    mainTitle.addEventListener("click", () => {
      titleClickCount++;

      clearTimeout(clickResetTimer);
      clickResetTimer = setTimeout(() => {
        titleClickCount = 0;
      }, 1200);

      if (titleClickCount === 3) {
        titleClickCount = 0;
        showSecretPopup();
      }
    });

    function showSecretPopup() {
      secretPopup.classList.add("show");

      setTimeout(() => {
        secretPopup.classList.remove("show");
      }, 2500);
    }

    // sakura bloom button
    function bloomSakura() {
      sakuraBtn.classList.remove("bloom");
      void sakuraBtn.offsetWidth;
      sakuraBtn.classList.add("bloom");

      sakuraPopup.classList.add("show");

      // extra burst petals pas dipencet
      for (let i = 0; i < 10; i++) {
        const burst = document.createElement("div");
        burst.classList.add("petal");
        burst.style.left = "50vw";
        burst.style.top = "45vh";
        burst.style.animationDuration = (3 + Math.random() * 2) + "s";
        burst.style.opacity = 0.7 + Math.random() * 0.3;
        burst.style.transform = `rotate(${Math.random() * 360}deg) scale(${0.8 + Math.random()})`;
        bgPetals.appendChild(burst);

        setTimeout(() => {
          burst.remove();
        }, 5000);
      }

      setTimeout(() => {
        sakuraPopup.classList.remove("show");
      }, 2200);

      setTimeout(() => {
        sakuraBtn.classList.remove("bloom");
      }, 1300);
    }
  </script>
</body>
</html>
